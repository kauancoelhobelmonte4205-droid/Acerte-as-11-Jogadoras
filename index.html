<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Acerte as 11</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b6623;
  color:white;
  text-align:center;
}

#menu{
  padding:20px;
}

button{
  padding:10px 20px;
  margin:10px;
  font-size:16px;
  cursor:pointer;
}

#game{
  display:none;
}

#field{
  position:relative;
  width:100%;
  max-width:400px;
  height:600px;
  margin:20px auto;
  background:#1e7f3f;
  border:3px solid white;
  border-radius:10px;
}

.player{
  position:absolute;
  width:90px;
  text-align:center;
}

.shirt{
  background:white;
  color:black;
  padding:8px;
  border-radius:8px;
  font-weight:bold;
}

input{
  width:80px;
  margin-top:5px;
  font-size:12px;
}
</style>
</head>

<body>

<div id="menu">
  <h1>Acerte as 11</h1>
  <button onclick="startGame()">Final Brasil Ladies Cup 2023</button>
</div>

<div id="game">
  <h2>FINAL Brasil Ladies Cup 2023</h2>
  <p>Internacional 1 x 0 Santos</p>
  <p>Acertos: <span id="score">0</span>/11</p>

  <div id="field">

    <!-- Goleira -->
    <div class="player" style="top:500px; left:155px;">
      <div class="shirt" id="p0">?</div>
      <input type="text" onkeyup="check(this,'Gabi Barbieri',0)">
    </div>

    <!-- Defesa -->
    <div class="player" style="top:420px; left:30px;">
      <div class="shirt" id="p1">?</div>
      <input type="text" onkeyup="check(this,'Tamara',1)">
    </div>

    <div class="player" style="top:420px; left:155px;">
      <div class="shirt" id="p2">?</div>
      <input type="text" onkeyup="check(this,'Isa Haas',2)">
    </div>

    <div class="player" style="top:420px; left:280px;">
      <div class="shirt" id="p3">?</div>
      <input type="text" onkeyup="check(this,'Bruna Benites',3)">
    </div>

    <!-- Meio -->
    <div class="player" style="top:300px; left:80px;">
      <div class="shirt" id="p4">?</div>
      <input type="text" onkeyup="check(this,'Capelinha',4)">
    </div>

    <div class="player" style="top:300px; left:230px;">
      <div class="shirt" id="p5">?</div>
      <input type="text" onkeyup="check(this,'Djeni',5)">
    </div>

    <!-- Ataque -->
    <div class="player" style="top:150px; left:80px;">
      <div class="shirt" id="p6">?</div>
      <input type="text" onkeyup="check(this,'Belén Aquino',6)">
    </div>

    <div class="player" style="top:150px; left:230px;">
      <div class="shirt" id="p7">?</div>
      <input type="text" onkeyup="check(this,'Priscila',7)">
    </div>

  </div>

</div>

<script>

let acertos = 0;

function startGame(){
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
}

function check(input,nome,id){
  if(input.value.trim().toLowerCase()===nome.toLowerCase()){
    document.getElementById("p"+id).innerText = nome;
    input.style.display="none";
    acertos++;
    document.getElementById("score").innerText = acertos;
  }
}

</script>

</body>
</html>
