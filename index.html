<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missing 11 - Final Libertadores 2023</title>
    <style>
        :root { --cor-principal: #ffffff; --cor-secundaria: #000000; --gramado: #15803d; }
        body { background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; overflow-x: hidden; }

        /* Tela de Introdução (Kick Off) */
        #modal-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .kick-off-box {
            background: #222; padding: 30px; border-radius: 15px; border: 2px solid white;
            width: 85%; max-width: 400px; text-align: center; box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        .btn-play {
            background: white; color: black; border: none; padding: 15px 40px;
            font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 20px;
        }

        /* Navegação */
        .nav-fases { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px 20px; }
        .btn-nav { background: #333; color: white; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; text-decoration: none; font-size: 12px; }

        .painel { background: #222; padding: 15px; border-bottom: 3px solid white; position: sticky; top: 0; z-index: 10; }
        input { padding: 12px; width: 85%; border-radius: 25px; border: none; font-size: 16px; text-align: center; outline: none; }

        /* Campo */
        .campo { position: relative; width: 350px; height: 500px; margin: 20px auto; background: var(--gramado); border: 3px solid white; border-radius: 10px; background-image: repeating-linear-gradient(#15803d, #15803d 40px, #166534 40px, #166534 80px); }
        .jogadora { position: absolute; width: 80px; text-align: center; }
        .camisa { 
            width: 42px; height: 42px; background: #f0f0f0; margin: 0 auto; 
            display: flex; align-items: center; justify-content: center;
            clip-path: polygon(25% 0%, 75% 0%, 100% 20%, 85% 35%, 75% 25%, 75% 100%, 25% 100%, 25% 25%, 15% 35%, 0% 20%);
        }
        .camisa::after { content: "?"; color: rgba(0,0,0,0.3); font-weight: bold; font-size: 18px; }
        .dica { font-family: monospace; font-size: 14px; color: #bbb; margin-top: 5px; font-weight: bold; }
        .nome-revelado { font-size: 10px; font-weight: bold; display: none; margin-top: 5px; background: white; color: black; padding: 2px; border-radius: 3px; }

        /* Estados de Acerto */
        .acertou .camisa { background: #000; border: 1px solid white; }
        .acertou .camisa::after { content: ""; }
        .acertou .dica { display: none; }
        .acertou .nome-revelado { display: block; }

        /* Posicionamento 4-3-3 */
        .gol { bottom: 10px; left: 135px; } 
        .zag1 { bottom: 85px; left: 65px; } .zag2 { bottom: 85px; left: 205px; }
        .lat1 { bottom: 135px; left: 5px; } .lat2 { bottom: 135px; left: 265px; }
        .meia1 { bottom: 230px; left: 35px; } .meia2 { bottom: 260px; left: 135px; } .meia3 { bottom: 230px; left: 235px; }
        .ata1 { top: 70px; left: 35px; } .ata2 { top: 30px; left: 135px; } .ata3 { top: 70px; left: 235px; }
    </style>
</head>
<body>

    <div id="modal-inicio">
        <div class="kick-off-box">
            <h2>KICK OFF</h2>
            <p>Final da Libertadores Feminina 2023</p>
            <p style="font-size: 13px; color: #aaa;">
                <b>Palmeiras 0 x 1 Corinthians</b><br>
                21/10/2023<br>
                Estádio Pascual Guerrero
            </p>
            <button class="btn-play" onclick="comecarJogo()">PLAY</button>
        </div>
    </div>

    <div class="nav-fases">
        <a href="index.html" class="btn-nav">⬅ Jogo Anterior</a>
        <span>Escalação 2</span>
        <button class="btn-nav" disabled>Próximo ➡</button>
    </div>

    <div class="painel">
        <input type="text" id="busca" placeholder="Digite o nome..." disabled>
        <p>Acertos: <span id="placar">0</span>/11</p>
    </div>

    <div class="campo">
        <div class="jogadora gol" data-nome="Lele"></div>
        <div class="jogadora lat1" data-nome="Katiuscia"></div>
        <div class="jogadora zag1" data-nome="Tarciane"></div>
        <div class="jogadora zag2" data-nome="Mariza"></div>
        <div class="jogadora lat2" data-nome="Yasmim"></div> <div class="jogadora meia1" data-nome="Luana"></div>
        <div class="jogadora meia2" data-nome="Gabi Zanotti"></div>
        <div class="jogadora meia3" data-nome="Vic Albuquerque"></div>
        <div class="jogadora ata1" data-nome="Tamires"></div>
        <div class="jogadora ata2" data-nome="Millene"></div>
        <div class="jogadora ata3" data-nome="Gabi Portilho"></div>
    </div>

    <script>
        const input = document.getElementById('busca');
        const placar = document.getElementById('placar');
        const listaJogadoras = document.querySelectorAll('.jogadora');
        let acertos = 0;

        function comecarJogo() {
            document.getElementById('modal-inicio').style.display = 'none';
            input.disabled = false;
            input.focus();
        }

        function gerarAsteriscos(nome) {
            return nome.replace(/[a-zA-Z]/g, '*');
        }

        listaJogadoras.forEach(j => {
            const nome = j.getAttribute('data-nome');
            j.innerHTML = `
                <div class="camisa"></div>
                <div class="dica">${gerarAsteriscos(nome)}</div>
                <div class="nome-revelado">${nome.toUpperCase()}</div>
            `;
        });

        input.addEventListener('input', () => {
            const digitado = input.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            
            listaJogadoras.forEach(j => {
                const nomeCorreto = j.getAttribute('data-nome').toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                
                if (digitado === nomeCorreto && !j.classList.contains('acertou')) {
                    j.classList.add('acertou');
                    acertos++;
                    placar.innerText = acertos;
                    input.value = '';

                    if (acertos === 11) {
                        input.disabled = true;
                        input.placeholder = "TETRACAMPEÃS!";
                        setTimeout(() => alert("🏆 FIM DE JOGO! Corinthians Tetracampeão da Libertadores!"), 300);
                    }
                }
            });
        });
    </script>
</body>
</html>
