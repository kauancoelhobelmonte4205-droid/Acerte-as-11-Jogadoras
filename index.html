<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missing 11 - Gurias Coloradas</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background-color: #1a1a1a;
            color: white;
        }

        h1 { margin: 15px 0; color: #f87171; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        .search-container { margin-bottom: 20px; }
        
        input {
            padding: 12px;
            width: 280px;
            border-radius: 25px;
            border: 2px solid #ef4444;
            font-size: 16px;
            outline: none;
        }

        /* O Campo de Jogo */
        .campo {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 620px;
            margin: auto;
            background: #15803d;
            border: 5px solid white;
            border-radius: 15px;
            /* Gramado */
            background-image: repeating-linear-gradient(#15803d, #15803d 40px, #166534 40px, #166534 80px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Container da Jogadora */
        .jogadora {
            position: absolute;
            width: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s ease;
        }

        /* Estilo da Camisa */
        .camisa-img {
            width: 50px;
            height: auto;
            filter: brightness(0) invert(1) opacity(0.3); /* Fica branca/apagada antes de acertar */
            transition: filter 0.5s ease;
        }

        /* Estilo do Nome */
        .nome-display {
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 10px;
            margin-top: 5px;
            min-width: 60px;
            height: 14px;
            visibility: hidden; /* Esconde o nome até acertar */
        }

        /* Quando acertar (Classe ativada pelo JS) */
        .jogadora.revelada .camisa-img {
            filter: brightness(1) opacity(1); /* Mostra a cor real da camisa */
        }

        .jogadora.revelada .nome-display {
            visibility: visible; /* Mostra o nome */
            background: #ef4444; /* Fundo vermelho do Inter */
        }

        /* POSICIONAMENTO (4-3-3) */
        .gol { top: 530px; left: 175px; }
        .lat1 { top: 430px; left: 20px; }
        .lat2 { top: 430px; left: 330px; }
        .zag1 { top: 460px; left: 100px; }
        .zag2 { top: 460px; left: 250px; }
        .meia1 { top: 310px; left: 50px; }
        .meia2 { top: 290px; left: 175px; }
        .meia3 { top: 310px; left: 300px; }
        .ata1 { top: 150px; left: 50px; }
        .ata2 { top: 110px; left: 175px; }
