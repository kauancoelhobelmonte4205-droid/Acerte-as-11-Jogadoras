<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missing 11 - Gurias Coloradas</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .info-partida { background: #000; padding: 10px; font-size: 12px; border-bottom: 2px solid #ef4444; }
        .painel { background: #222; padding: 15px; position: sticky; top: 0; z-index: 10; }
        input { padding: 12px; width: 80%; border-radius: 20px; border: none; font-size: 16px; outline: none; }
        
        .campo { position: relative; width: 350px; height: 500px; margin: 20px auto; background: #15803d; border: 3px solid white; border-radius: 10px; overflow: hidden; }
        
        .jogadora { position: absolute; width: 80px; text-align: center; }
        .camisa { width: 40px; height: 40px; background: #444; margin: 0 auto; display: flex; align-items: center; justify-content: center; clip-path: polygon(25% 0%, 75% 0%, 100% 20%, 85% 35%, 75% 25%, 75% 100%, 25% 100%, 25% 25%, 15% 35%, 0% 20%); }
        .camisa::after { content: "?"; color: rgba(255,255,255,0.2); font-weight: bold; }
        
        .dica { font-family: monospace; font-size: 14px; color: #aaa; margin-top: 5px; display: block; }
        .nome-revelado { font-size: 11px; font-weight: bold; background: #ef4444; display: none; margin-top: 5px; padding: 2px; }

        /* Estilo Acerto */
        .acertou .camisa { background: #ef4444; }
        .acertou .camisa::after { content: ""; }
        .acertou .dica { display: none; }
        .acertou .nome-revelado { display: block; }

        /* Posições */
        .gol { bottom: 10px; left: 135px; }
        .zag1 { bottom: 80px; left: 60px; }
        .zag2 { bottom: 80px; left: 210px; }
        .lat1 { bottom: 130px; left: 5px; }
        .lat2 { bottom: 130px; left: 265px; }
        .meia1 { bottom: 220px; left: 30px; }
        .meia2 { bottom: 250px; left: 135px; }
        .meia3 { bottom: 220px; left: 240px; }
        .ata1 { top: 60px; left: 30px; }
        .ata2 { top: 20px; left: 135px; }
        .ata3 { top: 60px; left: 240px; }
    </style>
</head>
<body>

    <div class="info-partida">
        <b>BRASIL LADIES CUP 2023 - FINAL</b><br>
        Inter x Santos | 10/12/2023 | Canindé
    </div>

    <div class="painel">
        <input type="text" id="busca" placeholder="Chute o nome...">
        <p>Acertos: <span id="placar">0</span>/11</p>
    </div>

    <div class="campo">
        <div class="jogadora gol" data-nome="gabi barbieri" data-dica="**** ********"></div>
        <div class="jogadora lat1" data-nome="tamara" data-dica="******"></div>
        <div class="jogadora lat2" data-nome="eskerdinha" data-dica="**********"></div>
        <div class="jogadora zag1" data-nome="isa haas" data-dica="*** ****"></div>
        <div class="jogadora zag2" data-nome="bruna benites" data-dica="***** *******"></div>
        <div class="jogadora meia1" data-nome="capelinha" data-dica="*********"></div>
        <div class="jogadora meia2" data-nome="djeni" data-dica="*****"></div>
        <div class="jogadora meia3" data-nome="leticia monteiro" data-dica="******* ********"></div>
        <div class="jogadora ata1" data-nome="soll" data-dica="****"></div>
        <div class="jogadora ata2" data-nome="belen aquino" data-dica="***** ******"></div>
        <div class="jogadora ata3" data-nome="priscila" data-dica="********"></div>
    </div>

    <script>
        const input = document.getElementById('busca');
        const placar = document.getElementById('placar');
        const listaJogadoras = document.querySelectorAll('.jogadora');
        let acertos = 0;

        // Monta o visual inicial (camisa + asteriscos)
        listaJogadoras.forEach(j => {
            j.innerHTML = `
                <div class="camisa"></div>
                <div class="dica">${j.getAttribute('data-dica')}</div>
                <div class="nome-revelado">${j.getAttribute('data-nome').toUpperCase()}</div>
            `;
        });

        input.addEventListener('input', () => {
            if (acertos >= 11) return; // Trava o jogo se já ganhou

            const digitado = input.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            
            listaJogadoras.forEach(j => {
                const nomeCorreto = j.getAttribute('data-nome').normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                
                if (digitado === nomeCorreto && !j.classList.contains('acertou')) {
                    j.classList.add('acertou');
                    acertos++;
                    placar.innerText = acertos;
                    input.value = '';

                    if (acertos === 11) {
                        input.disabled = true; // Desativa o campo
                        input.placeholder = "VOCÊ VENCEU!";
                        setTimeout(() => alert("🏆 CAMPEÃS! Você escalou o time do título!"), 300);
                    }
                }
            });
        });
    </script>
</body>
</html>
