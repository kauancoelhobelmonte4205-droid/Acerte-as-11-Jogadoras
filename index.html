<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalação 1</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #0b6623;
    color: white;
}

h1 {
    margin: 15px 0;
}

.campo {
    position: relative;
    width: 100%;
    max-width: 400px;
    height: 600px;
    margin: auto;
    background: #15803d;
    border: 3px solid white;
    border-radius: 10px;
}

.jogadora {
    position: absolute;
    width: 90px;
    font-size: 12px;
    font-weight: bold;
}

.gol { top: 550px; left: 155px; }
.zag1 { top: 470px; left: 70px; }
.zag2 { top: 470px; left: 240px; }
.lat1 { top: 420px; left: 10px; }
.lat2 { top: 420px; left: 300px; }

.meia1 { top: 330px; left: 40px; }
.meia2 { top: 300px; left: 155px; }
.meia3 { top: 330px; left: 270px; }

.ata1 { top: 200px; left: 40px; }
.ata2 { top: 160px; left: 155px; }
.ata3 { top: 200px; left: 270px; }

</style>
</head>

<body>

<h1>Escalação 1</h1>

<div class="campo">

<div class="jogadora gol">Gabi Barbieri</div>

<div class="jogadora lat1">Tamara</div>
<div class="jogadora lat2">Eskerdinha</div>

<div class="jogadora zag1">Isa Haas</div>
<div class="jogadora zag2">Bruna Benites</div>

<div class="jogadora meia1">Capelinha</div>
<div class="jogadora meia2">Djeni</div>
<div class="jogadora meia3">Letícia Monteiro</div>

<div class="jogadora ata1">Soll</div>
<div class="jogadora ata2">Belén Aquino</div>
<div class="jogadora ata3">Priscila</div>

</div>

</body>
</html>
