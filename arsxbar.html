<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missing 11 - Final Champions 25</title>
    <style>
        :root { --vermelho-arsenal: #ef4444; --branco: #ffffff; --gramado: #15803d; --amarelo: #fde047; }
        body { background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        
        #modal-inicio, #modal-vitoria { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        #modal-vitoria { display: none; }

        .kick-off-box { background: #222; padding: 30px; border-radius: 20px; border: 1px solid #333; width: 80%; max-width: 400px; }
        .btn-play, .btn-proximo { background: var(--branco); color: black; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; text-transform: uppercase; text-decoration: none; display: inline-block; }
        
        .nav-fases { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px 20px; }
        .btn-nav { background: #333; color: white; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; text-decoration: none; font-size: 12px; }
        
        .painel { background: #222; padding: 15px; border-bottom: 3px solid var(--vermelho-arsenal); position: sticky; top: 0; z-index: 10; }
        input { padding: 12px; width: 85%; border-radius: 25px; border: none; font-size: 16px; text-align: center; outline: none; }
        
        #placar { color: var(--amarelo); font-weight: bold; }

        .campo { position: relative; width: 350px; height: 500px; margin: 20px auto; background: var(--gramado); border: 3px solid white; border-radius: 10px; }
        .jogadora { position: absolute; width: 80px; text-align: center; }
        .camisa { width: 40px; height: 40px; background: var(--vermelho-arsenal); margin: 0 auto; display: flex; align-items: center; justify-content: center; clip-path: polygon(25% 0%, 75% 0%, 100% 20%, 85% 35%, 75% 25%, 75% 100%, 25% 100%, 25% 25%, 15% 35%, 0% 20%); border: 1px solid white; }
        .camisa::after { content: attr(data-numero); color: rgba(255,255,255,0.4); font-weight: bold; font-size: 12px; }
        
        .dica { font-family: monospace; font-size: 11px; color: #bbb; margin-top: 5px; white-space: nowrap; }
        .nome-revelado { font-size: 10px; font-weight: bold; display: none; margin-top: 5px; background: white; color: black; padding: 2px; border-radius: 3px; }
        
        .acertou .camisa { background: white; border-color: var(--vermelho-arsenal); }
        .acertou .camisa::after { color: var(--vermelho-arsenal); }
        .acertou .dica { display: none; }
        .acertou .nome-revelado { display: block; }

        /* Posições (4-2-3-1) */
        .pos14 { bottom: 10px; left: 135px; }
        .pos2 { bottom: 90px; left: 5px; } .pos6 { bottom: 85px; left: 85px; } .pos7 { bottom: 85px; left: 185px; } .pos11 { bottom: 90px; left: 265px; }
        .pos10 { bottom: 190px; left: 60px; } .pos8 { bottom: 190px; left: 210px; }
        .pos18 { top: 160px; left: 20px; } .pos12 { top: 140px; left: 135px; } .pos19 { top: 160px; left: 250px; }
        .pos23 { top: 40px; left: 135px; }
    </style>
</head>
<body>
    <div id="modal-inicio">
        <div class="kick-off-box">
            <h2 style="color: var(--vermelho-arsenal);">KICK OFF</h2>
            <p><b>UEFA Women’s Champions League - FINAL</b></p>
            <p style="font-size: 14px; line-height: 1.6;">Arsenal 1 x 0 Barcelona<br>24/05/2025 - 13:00<br>Estádio José Alvalade</p>
            <button class="btn-play" onclick="document.getElementById('modal-inicio').style.display='none';document.getElementById('busca').disabled=false;document.getElementById('busca').focus();">JOGAR</button>
        </div>
    </div>

    <div id="modal-vitoria">
        <div class="kick-off-box">
            <h2 style="color: var(--vermelho-arsenal);">CAMPEÃS!</h2>
            <p>Histórico! Você escalou o Arsenal campeão da Europa!</p>
            <a href="euro.html" class="btn-proximo">VOLTAR AO MENU</a>
        </div>
    </div>

    <div class="nav-fases">
        <a href="euro.html" class="btn-nav">🏠 Menu Europa</a>
        <span>Champions League 24/25</span>
        <button class="btn-nav" style="opacity: 0.3;">Próximo ➡</button>
    </div>

    <div class="painel">
        <input type="text" id="busca" placeholder="Digite o NOME COMPLETO..." disabled>
        <p>Acertos: <span id="placar">0</span>/11</p>
    </div>

    <div class="campo">
        <div class="jogadora pos14" data-nome="Van Domselaar" data-num="14"></div>
        <div class="jogadora pos2" data-nome="Emily Fox" data-num="2"></div>
        <div class="jogadora pos6" data-nome="Leah Williamson" data-num="6"></div>
        <div class="jogadora pos7" data-nome="Steph Catley" data-num="7"></div>
        <div class="jogadora pos11" data-nome="Katie McCabe" data-num="11"></div>
        <div class="jogadora pos10" data-nome="Kim Little" data-num="10"></div>
        <div class="jogadora pos8" data-nome="Mariona Caldentey" data-num="8"></div>
        <div class="jogadora pos18" data-nome="Chloe Kelly" data-num="18"></div>
        <div class="jogadora pos12" data-nome="Frida Maanum" data-num="12"></div>
        <div class="jogadora pos19" data-nome="Caitlin Foord" data-num="19"></div>
        <div class="jogadora pos23" data-nome="Alessia Russo" data-num="23"></div>
    </div>

    <script>
        const input = document.getElementById('busca');
        const lista = document.querySelectorAll('.jogadora');
        const modalVitoria = document.getElementById('modal-vitoria');
        let acertos = 0;

        lista.forEach(j => {
            const nome = j.getAttribute('data-nome');
            const num = j.getAttribute('data-num');
            j.innerHTML = `<div class="camisa" data-numero="${num}"></div><div class="dica">${nome.replace(/[a-zA-Z]/g, '*')}</div><div class="nome-revelado">${nome.toUpperCase()}</div>`;
        });

        input.addEventListener('input', () => {
            const digitado = input.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            lista.forEach(j => {
                const correto = j.getAttribute('data-nome').toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

                // Exige o nome completo exatamente como no data-nome
                if (digitado === correto && !j.classList.contains('acertou')) {
                    j.classList.add('acertou');
                    acertos++;
                    document.getElementById('placar').innerText = acertos;
                    input.value = '';
                    if (acertos === 11) { setTimeout(() => { modalVitoria.style.display = 'flex'; }, 500); }
                }
            });
        });
    </script>
</body>
</html>
