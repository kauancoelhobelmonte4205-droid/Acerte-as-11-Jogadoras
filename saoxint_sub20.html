<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missing 11 - Brasileirão Sub-20</title>
    <style>
        :root { --vermelho-spfc: #ff0000; --branco: #ffffff; --preto: #000000; --gramado-claro: #15803d; --gramado-escuro: #166534; }
        body { background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        
        #modal-inicio, #modal-vitoria { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        #modal-vitoria { display: none; }

        .kick-off-box { background: #222; padding: 30px; border-radius: 20px; border: 1px solid #333; width: 80%; max-width: 400px; }
        .btn-play, .btn-proximo { background: var(--branco); color: black; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; text-transform: uppercase; text-decoration: none; display: inline-block; }
        
        .nav-fases { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px 20px; }
        .btn-nav { background: #333; color: white; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; text-decoration: none; font-size: 12px; }
        
        .painel { background: #222; padding: 15px; border-bottom: 3px solid var(--vermelho-spfc); position: sticky; top: 0; z-index: 10; }
        input { padding: 12px; width: 85%; border-radius: 25px; border: none; font-size: 16px; text-align: center; outline: none; }
        
        #placar { color: var(--vermelho-spfc); font-weight: bold; }

        .campo { 
            position: relative; 
            width: 350px; 
            height: 500px; 
            margin: 20px auto; 
            background: repeating-linear-gradient(to bottom, var(--gramado-claro), var(--gramado-claro) 50px, var(--gramado-escuro) 50px, var(--gramado-escuro) 100px);
            border: 3px solid white; 
            border-radius: 10px;
            overflow: hidden;
        }

        .campo::before { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.4); }
        .campo::after { content: ""; position: absolute; top: 50%; left: 50%; width: 80px; height: 80px; border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%); }

        .area-box { position: absolute; left: 50%; transform: translateX(-50%); border: 2px solid rgba(255,255,255,0.4); width: 180px; height: 70px; }
        .area-topo { top: -2px; }
        .area-fundo { bottom: -2px; }

        .jogadora { position: absolute; width: 80px; text-align: center; z-index: 5; }
        
        .camisa { 
            width: 40px; 
            height: 40px; 
            background: linear-gradient(to bottom, var(--branco) 0%, var(--branco) 40%, var(--vermelho-spfc) 40%, var(--vermelho-spfc) 50%, var(--preto) 50%, var(--preto) 60%, var(--branco) 60%, var(--branco) 100%);
            margin: 0 auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            clip-path: polygon(25% 0%, 75% 0%, 100% 20%, 85% 35%, 75% 25%, 75% 100%, 25% 100%, 25% 25%, 15% 35%, 0% 20%); 
            border: 1px solid #ccc; 
            position: relative; 
        }

        .camisa::after { content: "?"; color: var(--preto); font-weight: bold; font-size: 14px; opacity: 0.5; }
        
        .dica { font-family: monospace; font-size: 11px; color: #bbb; margin-top: 5px; display: block; line-height: 1.1; word-spacing: 100vw; }
        .nome-revelado { font-size: 10px; font-weight: bold; display: none; margin-top: 5px; background: white; color: black; padding: 2px; border-radius: 3px; }
        
        .acertou .camisa::after { content: attr(data-numero); color: var(--preto); font-size: 13px; opacity: 1; }
        .acertou .dica { display: none; }
        .acertou .nome-revelado { display: block; }

        /* Formação 4-3-3 */
        .pos-gk { bottom: 10px; left: 135px; } 
        .pos-ld { bottom: 85px; left: 10px; } .pos-z1 { bottom: 75px; left: 95px; } .pos-z2 { bottom: 75px; left: 175px; } .pos-le { bottom: 85px; left: 260px; }
        .pos-m1 { bottom: 180px; left: 55px; } .pos-m2 { bottom: 170px; left: 135px; } .pos-m3 { bottom: 180px; left: 215px; }
        .pos-a1 { top: 120px; left: 15px; } .pos-a2 { top: 90px; left: 135px; } .pos-a3 { top: 120px; left: 255px; }
    </style>
</head>
<body>

    <div id="modal-inicio">
        <div class="kick-off-box">
            <h2 style="color: var(--vermelho-spfc);">SÃO PAULO x INTER</h2>
            <p><b>Brasileirão Feminino Sub-20 - 4ª Rodada</b></p>
            <p style="font-size: 13px; line-height: 1.6;">São Paulo 7 x 4 Internacional<br>19/04/2023 - 15:00<br>Marcelo Portugal - Cotia</p>
            <button class="btn-play" onclick="document.getElementById('modal-inicio').style.display='none';document.getElementById('busca').disabled=false;document.getElementById('busca').focus();">JOGAR</button>
        </div>
    </div>

    <div id="modal-vitoria">
        <div class="kick-off-box">
            <h2 style="color: var(--vermelho-spfc);">CHUVA DE GOLS!</h2>
            <p>7 a 4?! Que partida! Você escalou o time que venceu esse clássico maluco.</p>
            <a href="base.html" class="btn-proximo">VOLTAR À BASE</a>
        </div>
    </div>

    <div class="nav-fases">
        <a href="saoxcor_sub18.html" class="btn-nav">⬅ Jogo Anterior</a>
        <span>Brasileirão Sub-20 2023</span>
        <button class="btn-nav" style="opacity: 0.3;">Próximo ➡</button>
    </div>

    <div class="painel">
        <input type="text" id="busca" placeholder="Nome da jogadora..." disabled>
        <p>Acertos: <span id="placar">0</span>/11</p>
    </div>

    <div class="campo">
        <div class="area-box area-topo"></div>
        <div class="area-box area-fundo"></div>

        <div class="jogadora pos-gk" data-nome="Nanda" data-numero="1"></div>
        <div class="jogadora pos-ld" data-nome="Ravena" data-numero="2"></div>
        <div class="jogadora pos-z1" data-nome="Barraca" data-numero="3"></div>
        <div class="jogadora pos-z2" data-nome="Kedima" data-numero="4"></div>
        <div class="jogadora pos-le" data-nome="Gi" data-numero="6"></div>
        <div class="jogadora pos-m1" data-nome="GG" data-numero="5"></div>
        <div class="jogadora pos-m2" data-nome="Ana Julia" data-numero="8"></div>
        <div class="jogadora pos-m3" data-nome="Amaral" data-numero="10"></div>
        <div class="jogadora pos-a1" data-nome="Flavia" data-numero="7"></div>
        <div class="jogadora pos-a2" data-nome="Emelli" data-numero="9"></div>
        <div class="jogadora pos-a3" data-nome="Mi" data-numero="11"></div>
    </div>

    <script>
        const input = document.getElementById('busca');
        const lista = document.querySelectorAll('.jogadora');
        const modalVitoria = document.getElementById('modal-vitoria');
        let acertos = 0;

        lista.forEach(j => {
            const nome = j.getAttribute('data-nome');
            j.innerHTML = `<div class="camisa"></div><div class="dica">${nome.replace(/[a-zA-Z]/g, '*')}</div><div class="nome-revelado">${nome.toUpperCase()}</div>`;
        });

        input.addEventListener('input', () => {
            const digitado = input.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            lista.forEach(j => {
                const correto = j.getAttribute('data-nome').toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                if (digitado === correto && !j.classList.contains('acertou')) {
                    j.classList.add('acertou');
                    acertos++;
                    document.getElementById('placar').innerText = acertos;
                    input.value = '';
                    if (acertos === 11) { setTimeout(() => { modalVitoria.style.display = 'flex'; }, 500); }
                }
            });
        });
    </script>
</body>
</html>
