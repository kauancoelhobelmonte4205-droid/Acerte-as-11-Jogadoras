<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleções - Acerte as 11</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; text-align: center; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { background: #000; width: 100%; padding: 25px 0; border-bottom: 3px solid #fde047; margin-bottom: 30px; }
        h1 { margin: 0; font-size: 22px; text-transform: uppercase; color: #fde047; }
        .container { width: 90%; max-width: 500px; flex: 1; }
        .card-jogo { background: #222; border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid #444; transition: 0.3s; text-decoration: none; color: white; display: flex; align-items: center; justify-content: space-between; }
        .card-jogo:hover { border-color: #fde047; transform: scale(1.02); }
        .info-jogo h3 { margin: 0; font-size: 18px; }
        .info-jogo p { margin: 5px 0 0 0; color: #bbb; font-size: 12px; }
        .btn-jogar { background: #fde047; color: black; padding: 8px 15px; border-radius: 5px; font-weight: bold; font-size: 12px; }
        .btn-voltar { margin-top: 20px; color: #fde047; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <header><h1>🌎 Seleções Nacionais</h1></header>
    <div class="container">
        <a href="braxeua.html" class="card-jogo">
            <div class="info-jogo">
                <h3>Brasil x EUA</h3>
                <p>Copa do Mundo 2007</p>
            </div>
            <div class="btn-jogar">JOGAR</div>
        </a>
        <a href="index.html" class="btn-voltar">← Voltar ao Menu</a>
    </div>
</body>
</html>
