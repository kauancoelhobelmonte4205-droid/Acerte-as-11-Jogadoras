<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias de Base - Menu</title>
    <style>
        :root { 
            --verde-base: #22c55e; 
            --fundo: #121212; 
            --card: #1e1e1e; 
            --branco: #ffffff;
        }
        
        body { 
            background-color: var(--fundo); 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        header { 
            background: #000; 
            width: 100%; 
            padding: 20px 0; 
            border-bottom: 2px solid var(--verde-base); 
            margin-bottom: 20px; 
            text-align: center;
        }

        h1 { 
            margin: 0; 
            font-size: 20px; 
            color: var(--verde-base); 
            text-transform: uppercase;
        }
        
        .container { 
            width: 90%; 
            max-width: 400px; 
            padding-bottom: 40px;
        }
        
        .card { 
            background: var(--card); 
            border-radius: 15px; 
            padding: 20px; 
            margin-bottom: 15px; 
            border: 1px solid #333; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            text-decoration: none;
            color: white;
            transition: 0.2s;
        }

        .card:hover { border-color: var(--verde-base); background: #252525; }
        .card:active { transform: scale(0.98); }

        .card-info h2 { margin: 0; font-size: 16px; }
        .card-info p { margin: 5px 0 0 0; color: #888; font-size: 12px; }

        .btn-jogar { 
            background: var(--branco); 
            color: black; 
            padding: 8px 12px; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 11px; 
            text-transform: uppercase;
        }

        .nav-voltar { 
            margin-top: 10px; 
            color: var(--verde-base); 
            text-decoration: none; 
            font-size: 14px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <header>
        <h1>🌱 CATEGORIAS DE BASE</h1>
    </header>

    <div class="container">
        
        <a href="intxgre_sub17.html" class="card">
            <div class="card-info">
                <h2>Inter x Grêmio</h2>
                <p>Brasileirao Sub-17 2024</p>
            </div>
            <div class="btn-jogar">JOGAR</div>
        </a>

        <a href="flaxbot_sub20.html" class="card">
            <div class="card-info">
                <h2>Flamengo x Botafogo</h2>
                <p>Brasileirão Sub-20 2024</p>
            </div>
            <div class="btn-jogar">JOGAR</div>
        </a>

        <a href="saoxcor_sub18.html" class="card">
            <div class="card-info">
                <h2>São Paulo x Corinthians</h2>
                <p>Brasileirão Sub-18 2021</p>
            </div>
            <div class="btn-jogar">JOGAR</div>
        </a>

        <a href="saoxint_sub20.html" class="card">
            <div class="card-info">
                <h2>São Paulo x Inter</h2>
                <p>Brasileirão Sub-20 2023</p>
            </div>
            <div class="btn-jogar">JOGAR</div>
        </a>

        <div style="border: 1px dashed #444; padding: 15px; border-radius: 15px; text-align: center; color: #666; font-size: 12px; margin-bottom: 20px;">
            Novas partidas em breve...
        </div>

        <a href="index.html" class="nav-voltar">← Voltar ao Menu Principal</a>

    </div>

</body>
</html>
