<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missing 11 - Jogo 3</title>
    <style>
        :root { --cor: #ffffff; --gramado: #15803d; }
        body { background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        
        /* MODAIS */
        #modal-inicio, #modal-vitoria { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        #modal-vitoria { display: none; }

        .kick-off-box { background: #222; padding: 30px; border-radius: 15px; border: 2px solid var(--cor); width: 80%; max-width: 400px; }
        .btn-play, .btn-proximo { background: var(--cor); color: black; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 20px; text-decoration: none; display: inline-block; }
        
        .nav-fases { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px 20px; }
        .btn-nav { background: #333; color: white; border: 1px solid #555; padding: 5px 10px; border-radius: 5px; text-decoration: none; font-size: 12px; }
        .painel { background: #222; padding: 15px; border-bottom: 3px solid var(--cor); position: sticky; top: 0; z-index: 10; }
        input { padding: 12px; width: 85%; border-radius: 25px; border: none; font-size: 16px; text-align: center; outline: none; }
        
        #placar { color: var(--cor); font-weight: bold; }

        .campo { position: relative; width: 350px; height: 500px; margin: 20px auto; background: var(--gramado); border: 3px solid white; border-radius: 10px; }
        .jogadora { position: absolute; width: 80px; text-align: center; }
        .camisa { width: 40px; height: 40px; background: #f0f0f0; margin: 0 auto; display: flex; align-items: center; justify-content: center; clip-path: polygon(25% 0%, 75% 0%, 100% 20%, 85% 35%, 75% 25%, 75% 100%, 25% 100%, 25% 25%, 15% 35%, 0% 20%); }
        .camisa::after { content: "?"; color: rgba(0,0,0,0.3); font-weight: bold; }
        .dica { font-family: monospace; font-size: 14px; color: #bbb; margin-top: 5px; }
        .nome-revelado { font-size: 10px; font-weight: bold; display: none; margin-top: 5px; background: white; color: black; padding: 2px; border-radius: 3px; }
        .acertou .camisa { background: #000; border: 1px solid white; }
        .acertou .camisa::after { content: ""; }
        .acertou .dica { display: none; }
        .acertou .nome-revelado { display: block; }

        .gol { bottom: 10px; left: 135px; }
        .lat1 { bottom: 85px; left: 5px; } .zag1 { bottom: 80px; left: 85px; } .zag2 { bottom: 80px; left: 185px; } .lat2 { bottom: 85px; left: 265px; }
        .meia1 { bottom: 190px; left: 20px; } .meia2 { bottom: 180px; left: 100px; } .meia3 { bottom: 180px; left: 180px; } .meia4 { bottom: 190px; left: 260px; }
        .ata1 { top: 60px; left: 80px; } .ata2 { top: 60px; left: 190px; }
    </style>
</head>
<body>
    <div id="modal-inicio">
        <div class="kick-off-box">
            <h2>KICK OFF</h2>
            <p><b>Paulistão Feminino - SEMIFINAL</b></p>
            <p style="font-size: 14px; line-height: 1.6;">Corinthians 8 x 0 Palmeiras<br>12/11/2023 - 11:00<br>Neo Química Arena</p>
            <button class="btn-play" onclick="document.getElementById('modal-inicio').style.display='none';document.getElementById('busca').disabled=false;document.getElementById('busca').focus();">PLAY</button>
        </div>
    </div>

    <div id="modal-vitoria">
        <div class="kick-off-box">
            <h2 style="color: #ffffff;">QUE GOLEADA!</h2>
            <p>Você escalou o time do histórico 8x0 com perfeição!</p>
            <a href="index.html" class="btn-proximo">VOLTAR AO MENU</a>
        </div>
    </div>

    <div class="nav-fases">
        <a href="corxpal.html" class="btn-nav">⬅ Jogo Anterior</a>
        <span>Escalação 3</span>
        <button class="btn-nav" style="opacity: 0.3;">Próximo ➡</button>
    </div>

    <div class="painel">
        <input type="text" id="busca" placeholder="Digite o nome..." disabled>
        <p>Acertos: <span id="placar">0</span>/11</p>
    </div>

    <div class="campo">
        <div class="jogadora gol" data-nome="Lele"></div>
        <div class="jogadora lat1" data-nome="Katiuscia"></div>
        <div class="jogadora zag1" data-nome="Tarciane"></div>
        <div class="jogadora zag2" data-nome="Mariza"></div>
        <div class="jogadora lat2" data-nome="Tamires"></div>
        <div class="jogadora meia1" data-nome="Luana"></div>
        <div class="jogadora meia2" data-nome="Duda Sampaio"></div>
        <div class="jogadora meia3" data-nome="Vic Albuquerque"></div>
        <div class="jogadora meia4" data-nome="Gabi Zanotti"></div>
        <div class="jogadora ata1" data-nome="Gabi Portilho"></div>
        <div class="jogadora ata2" data-nome="Millene"></div>
    </div>

    <script>
        const input = document.getElementById('busca');
        const lista = document.querySelectorAll('.jogadora');
        const modalVitoria = document.getElementById('modal-vitoria');
        let acertos = 0;

        lista.forEach(j => {
            const nome = j.getAttribute('data-nome');
            j.innerHTML = `<div class="camisa"></div><div class="dica">${nome.replace(/[a-zA-Z]/g, '*')}</div><div class="nome-revelado">${nome.toUpperCase()}</div>`;
        });

        input.addEventListener('input', () => {
            const digitado = input.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            lista.forEach(j => {
                const correto = j.getAttribute('data-nome').toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                if (digitado === correto && !j.classList.contains('acertou')) {
                    j.classList.add('acertou'); 
                    acertos++; 
                    document.getElementById('placar').innerText = acertos; 
                    input.value = '';

                    if (acertos === 11) {
                        setTimeout(() => {
                            modalVitoria.style.display = 'flex';
                        }, 500);
                    }
                }
            });
        });
    </script>
</body>
</html>
